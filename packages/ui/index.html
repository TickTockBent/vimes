<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content (Chrome Android >=108): the layout
         viewport shrinks when the on-screen keyboard opens, so the sticky
         composer footer stays above it. Older/other browsers fall back to
         the visualViewport-driven offset in StreamView.vue. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="light dark" />
    <!-- The SVG favicon scales to any tab/bookmark size; the 192 PNG is the
         fallback for browsers without SVG-favicon support. Both are generated by
         scripts/make-icons.mjs. -->
    <link rel="icon" href="/icons/icon.v2.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/icons/icon-192.v2.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.v2.png" />
    <title>vimes</title>
  </head>
  <body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
